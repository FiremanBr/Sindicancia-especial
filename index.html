<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sindicância Especial — CBMRS</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:Arial,sans-serif;background:#f5f5f3;color:#111;min-height:100vh}
  .app{max-width:900px;margin:0 auto;padding:1.5rem 1rem 3rem}
  .header{background:#fff;border:1px solid #ddd;border-radius:10px;padding:1rem 1.25rem;margin-bottom:1rem;display:flex;align-items:center;gap:12px;flex-wrap:wrap}
  .header-title{font-size:17px;font-weight:700;color:#1a1a1a;flex:1}
  .sin-info{font-size:12px;color:#555;background:#f0f0ee;border-radius:6px;padding:5px 10px;white-space:nowrap}
  .pb-wrap{background:#e0e0dc;border-radius:99px;height:8px;width:180px;overflow:hidden}
  .pb{height:8px;border-radius:99px;background:#1D9E75;transition:width .4s}
  .counter{font-size:12px;color:#666;white-space:nowrap;min-width:50px;text-align:right}
  .btn-nova{font-size:12px;background:#fff;color:#444;border:1px solid #ccc;border-radius:6px;padding:6px 12px;cursor:pointer}
  .btn-nova:hover{background:#f5f5f3}
  .btn-hist{font-size:12px;background:#e8f0fb;color:#1a56b0;border:1px solid #a8c4ef;border-radius:6px;padding:6px 12px;cursor:pointer}
  .btn-hist:hover{background:#d0e2f8}
  .checklist{display:grid;grid-template-columns:repeat(2,1fr);gap:6px;margin-bottom:1rem}
  @media(max-width:560px){.checklist{grid-template-columns:1fr}}
  .ci{display:flex;align-items:center;gap:8px;padding:9px 12px;border-radius:8px;border:1px solid #ddd;background:#fff;transition:background .15s}
  .ci:hover{background:#f9f9f7}
  .ci.done{background:#e8f7f0;border-color:#a0d9bc}
  .ci-num{min-width:26px;height:26px;border-radius:50%;border:1px solid #ccc;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:#888;background:#f5f5f3;flex-shrink:0}
  .ci.done .ci-num{background:#1D9E75;color:#fff;border-color:#1D9E75}
  .ci-label{font-size:12.5px;color:#222;flex:1;line-height:1.35;cursor:pointer}
  .ci.done .ci-label{text-decoration:line-through;color:#2d7a55}
  .badge{font-size:9px;background:#deeafb;color:#1a56b0;border-radius:99px;padding:1px 6px;margin-left:5px;vertical-align:middle;font-weight:700}
  .btn-fill{font-size:11px;color:#1a56b0;background:#eef3fb;border:1px solid #a8c4ef;border-radius:6px;padding:4px 9px;cursor:pointer;white-space:nowrap;flex-shrink:0}
  .btn-fill:hover{background:#d0e2f8}
  .btn-fill.on{background:#d0e2f8;border-color:#1a56b0}
  .btn-chk{font-size:11px;color:#888;background:#fff;border:1px solid #ccc;border-radius:6px;padding:4px 9px;cursor:pointer;flex-shrink:0}
  .btn-chk:hover{background:#f0f0ee}

  .doc-panel{background:#fff;border:1px solid #ddd;border-radius:10px;overflow:hidden;margin-bottom:1rem}
  .doc-empty{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:160px;color:#aaa;gap:8px;padding:2rem;text-align:center}
  .doc-empty-icon{font-size:36px}
  .doc-hdr{padding:10px 16px;border-bottom:1px solid #eee;display:flex;align-items:center;justify-content:space-between;gap:8px;flex-wrap:wrap;background:#fafafa}
  .doc-hdr-title{font-size:13px;font-weight:700;color:#222}
  .toolbar{display:flex;gap:3px;flex-wrap:wrap;align-items:center}
  .tb{font-size:12px;background:#fff;border:1px solid #ddd;border-radius:5px;padding:4px 9px;cursor:pointer;color:#444}
  .tb:hover{background:#f0f0ee}
  .tb.special{color:#1a56b0;border-color:#a8c4ef;font-size:11px;font-weight:700}
  .tb.special:hover{background:#e8f0fb}
  .tb-sep{width:1px;height:18px;background:#e0e0dc;margin:0 3px}
  .doc-body{padding:16px;background:#e8e8e5}
  .doc-page{background:#fff;border:1px solid #ccc;padding:54px 64px;font-family:'Times New Roman',Times,serif;font-size:13px;line-height:1.6;color:#111;width:100%;outline:none;cursor:text;min-height:400px;border-radius:2px}
  .doc-page:focus{border-color:#1a56b0}
  .doc-actions{display:flex;gap:8px;margin-top:12px;flex-wrap:wrap;align-items:center}
  .save-info{font-size:11px;color:#888;flex:1}
  .btn-done{font-size:12px;background:#1D9E75;color:#fff;border:none;border-radius:6px;padding:7px 16px;cursor:pointer;font-weight:700}
  .btn-done:hover{background:#158a61}
  .btn-docx{font-size:12px;background:#1a56b0;color:#fff;border:none;border-radius:6px;padding:7px 14px;cursor:pointer;font-weight:700}
  .btn-docx:hover{background:#143e85}

  .notify{position:fixed;top:12px;left:50%;transform:translateX(-50%);background:#1D9E75;color:#fff;font-size:13px;font-weight:700;padding:10px 22px;border-radius:8px;display:none;z-index:9999;box-shadow:0 2px 8px rgba(0,0,0,.15)}

  /* Modal */
  .modal-bg{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.4);z-index:1000;align-items:flex-start;justify-content:center;padding:40px 16px;overflow-y:auto}
  .modal-bg.open{display:flex}
  .modal{background:#fff;border-radius:10px;width:100%;max-width:680px;overflow:hidden;border:1px solid #ddd}
  .modal-hdr{padding:14px 18px;border-bottom:1px solid #eee;display:flex;align-items:center;justify-content:space-between;background:#fafafa}
  .modal-title{font-size:15px;font-weight:700;color:#222}
  .modal-close{background:none;border:none;cursor:pointer;color:#888;font-size:22px;line-height:1;padding:0 4px}
  .modal-close:hover{color:#222}
  .modal-body{padding:16px;max-height:70vh;overflow-y:auto}
  .h-empty{text-align:center;padding:2rem;color:#aaa;font-size:14px}
  .h-item{border:1px solid #e0e0dc;border-radius:8px;padding:14px 16px;margin-bottom:10px}
  .h-hdr{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:10px;gap:8px}
  .h-date{font-size:13px;font-weight:700;color:#222}
  .h-meta{font-size:11px;color:#888;margin-top:2px}
  .h-acts{display:flex;gap:6px;flex-wrap:wrap;flex-shrink:0}
  .btn-ver{font-size:11px;color:#1a56b0;background:#eef3fb;border:1px solid #a8c4ef;border-radius:6px;padding:4px 10px;cursor:pointer}
  .btn-ver:hover{background:#d0e2f8}
  .btn-reuse{font-size:11px;color:#0F6E56;background:#e8f7f0;border:1px solid #a0d9bc;border-radius:6px;padding:4px 10px;cursor:pointer;font-weight:700}
  .btn-reuse:hover{background:#c8edda}
  .btn-del{font-size:11px;color:#888;background:#fff;border:1px solid #ddd;border-radius:6px;padding:4px 10px;cursor:pointer}
  .btn-del:hover{background:#f5f5f3}
  .h-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:3px;margin-bottom:10px}
  .hb{font-size:10px;padding:3px 7px;border-radius:4px}
  .hb.done{background:#e8f7f0;color:#0F6E56;font-weight:700}
  .hb.pend{background:#f5f5f3;color:#888}
  .vp{display:none;border-top:1px solid #eee;margin-top:10px;padding-top:10px}
  .vp.open{display:block}
  .vtabs{display:flex;gap:4px;margin-bottom:8px}
  .vtab{font-size:11px;background:#fff;border:1px solid #ddd;border-radius:6px;padding:4px 12px;cursor:pointer;color:#666}
  .vtab.on{background:#eef3fb;color:#1a56b0;border-color:#a8c4ef;font-weight:700}
  .vdoc{background:#f5f5f3;border-radius:6px;padding:16px 20px;font-family:'Times New Roman',Times,serif;font-size:12px;line-height:1.8;color:#222;max-height:300px;overflow-y:auto;border:1px solid #e0e0dc}

  .dados-panel{background:#fff;border:1px solid #ddd;border-radius:10px;margin-bottom:1rem;overflow:hidden}
  .dados-header{display:flex;align-items:center;justify-content:space-between;padding:.75rem 1.25rem;cursor:pointer;user-select:none;background:#fafafa;border-bottom:1px solid #eee}
  .dados-header:hover{background:#f5f5f3}
  .dados-title{font-size:13px;font-weight:700;color:#222}
  .dados-toggle{font-size:12px;color:#888}
  .dados-body{padding:.75rem 1.25rem 1rem}
  .dados-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px 12px}
  @media(max-width:700px){.dados-grid{grid-template-columns:repeat(2,1fr)}}
  @media(max-width:420px){.dados-grid{grid-template-columns:1fr}}
  .campo{display:flex;flex-direction:column;gap:3px}
  .campo.campo-obs{grid-column:span 2}
  .campo label{font-size:10px;font-weight:700;color:#888;text-transform:uppercase;letter-spacing:.04em}
  .campo input{font-size:12px;padding:5px 8px;border:1px solid #ddd;border-radius:6px;background:#f9f9f7;color:#222;font-family:Arial,sans-serif;width:100%}
  .campo input:focus{outline:none;border-color:#1a56b0;background:#fff}

</style>
</head>
<body>
<div class="notify" id="notify"></div>

<div class="app">
  <div class="header">
    <div class="header-title">⚑ Sindicância Especial — CBMRS</div>
    <div class="sin-info">1º Ten QTBM Santos · JOSÉ LUIZ SILVA DOS SANTOS</div>
    <div class="pb-wrap"><div class="pb" id="bar" style="width:0%"></div></div>
    <div class="counter" id="counter">0 / 18</div>
    <button class="btn-hist" onclick="openHist()">📋 Histórico</button>
    <button class="btn-nova" onclick="doReset()">↺ Nova sindicância</button>
  </div>

  
  <div class="dados-panel" id="dados-panel">
    <div class="dados-header" onclick="toggleDados()">
      <span class="dados-title">📋 Dados da Sindicância</span>
      <span class="dados-toggle" id="dados-toggle">▲</span>
    </div>
    <div class="dados-body" id="dados-body">
      <div class="dados-grid">
        <div class="campo"><label>Acidentado (Posto/Quadro/Nome)</label><input id="d_acidentado" placeholder="Ex: 2º Sgt QPBM FELIPE VARGAS OLIVEIRA" oninput="saveDados()"></div>
        <div class="campo"><label>Id Func</label><input id="d_idfunc" placeholder="Ex: 3694810" oninput="saveDados()"></div>
        <div class="campo"><label>Data do acidente</label><input id="d_data_acid" placeholder="Ex: 16/04/2026" oninput="saveDados()"></div>
        <div class="campo"><label>Data de abertura</label><input id="d_data_aber" placeholder="Ex: 19/05/2026" oninput="saveDados()"></div>
        <div class="campo"><label>Número da Portaria</label><input id="d_portaria" placeholder="Ex: 029/SA/DA/CBMRS/26" oninput="saveDados()"></div>
        <div class="campo"><label>Prazo de entrega</label><input id="d_prazo" placeholder="Ex: 18/06/2026" oninput="saveDados()"></div>
        <div class="campo"><label>Data de entrega</label><input id="d_entrega" placeholder="Ex: 16/06/2026" oninput="saveDados()"></div>
        <div class="campo campo-obs"><label>Observações</label><input id="d_obs" placeholder="Anotações livres..." oninput="saveDados()"></div>
      </div>
    </div>
  </div>

  <div class="checklist" id="cl"></div>


</div>

<div class="modal-bg" id="modal-bg" onclick="if(event.target===this)closeHist()">
  <div class="modal">
    <div class="modal-hdr">
      <span class="modal-title">📋 Histórico de Sindicâncias</span>
      <button class="modal-close" onclick="closeHist()">×</button>
    </div>
    <div class="modal-body" id="modal-body"></div>
  </div>
</div>

<script>
const SP='1º Ten QTBM', SN='JOSÉ LUIZ SILVA DOS SANTOS';
const LS_STATE='sind_state_v3';
const LS_DOC='sind_doc_v3_';
const LS_HIST='sind_hist_v3';

const ITEMS=[
  {label:'Termo de Abertura',                             modelo:true, dk:0},
  {label:'Portaria de Sindicância Especial',              modelo:true, dk:1},
  {label:'Parte relatando o acidente',                    modelo:false},
  {label:'Ofício com encaminhamentos da Chefia Imediata', modelo:false},
  {label:'Boletim de Atendimento Hospitalar',             modelo:false},
  {label:'Atestado Médico',                               modelo:false},
  {label:'Atestado de Origem',                            modelo:false},
  {label:'Receituário',                                   modelo:false},
  {label:'Exames',                                        modelo:false},
  {label:'Anexo I – Portaria SSP nº 095/2015',           modelo:false},
  {label:'Ordem de Serviço',                              modelo:false},
  {label:'CNH do acidentado',                             modelo:false},
  {label:'Termo de Oitiva das Testemunhas',               modelo:true, dk:2},
  {label:'Termo de Oitiva do Acidentado',                 modelo:true, dk:3},
  {label:'Parecer do Sindicante',                         modelo:true, dk:4},
  {label:'Ofício do Sindicante restituindo',              modelo:true, dk:5},
  {label:'Conclusão do responsável',                      modelo:false},
  {label:'Encaminhamento Cmt DA → DRH',                  modelo:false},
];

const TOTAL=ITEMS.length;
const DT={0:'Termo de Abertura',1:'Portaria de Sindicância Especial',2:'Termo de Oitiva das Testemunhas',3:'Termo de Oitiva do Acidentado',4:'Parecer do Sindicante',5:'Ofício do Sindicante Restituindo'};

const TPL={
  0:`<div style="text-align:center;line-height:1.5">ESTADO DO RIO GRANDE DO SUL<br>SECRETARIA DA SEGURANÇA PÚBLICA<br>CORPO DE BOMBEIROS MILITAR<br>DEPARTAMENTO ADMINISTRATIVO</div><br><div style="text-align:center">"URGENTE"</div><br><div style="text-align:left">SINDICÂNCIA ESPECIAL<br>ACIDENTE DE SERVIÇO SEM MORTE</div><br><br><div style="text-align:left">Sindicante: ${SP} ${SN}<br>Militar Estadual: 2º Sgt QPBM FELIPE VARGAS OLIVEIRA</div><br><br><div style="text-align:center">Termo de Abertura</div><br><div style="text-align:justify;text-indent:1.5cm">Aos dezenove dias, do mês de maio, do ano de dois mil e vinte e seis, dei início a presente Sindicância Especial, de Portaria nº 029/2026, a qual devo emitir parecer no prazo regulamentar se há ou não indício de acidente de serviço conforme legislação pertinente, referente ao fato ocorrido em 16 de abril de 2026.</div><br><div style="text-align:center">Porto Alegre, RS, 16 de junho de 2026.</div><br><br><div style="text-align:center">${SN} – ${SP}<br>Sindicante</div>`,
  1:`<div style="text-align:center;line-height:1.5">ESTADO DO RIO GRANDE DO SUL<br>SECRETARIA DA SEGURANÇA PÚBLICA<br>CORPO DE BOMBEIROS MILITAR</div><br><div style="text-align:right">Porto Alegre, RS, 13 de maio de 2026.</div><br><div style="text-align:left"><b>PORTARIA DE SINDICÂNCIA ESPECIAL<br>N.º 029/SA/DA/CBMRS/26</b></div><br><div style="text-align:left;padding-left:35%;line-height:1.6"><b>Do</b> Diretor de Logística e Patrimônio<br><b>Ao</b> ${SP} ${SN}<br><b>Assunto:</b> Instauração de Sindicância Especial<br><b>Anexo:</b> - Parte;<br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;- Atestado de Origem;<br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;- Anexo I Portaria SSP nº 095/2015;<br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;- Primeiro Atendimento.</div><br><div style="text-align:justify;text-indent:1.5cm">Tendo tomado conhecimento dos fatos constantes nos documentos que seguem em anexo, do acidente de serviço sem morte do Militar Estadual FELIPE VARGAS OLIVEIRA, Id Func 3694810, determino que seja com urgência, instaurada a Sindicância Especial, delegando-lhe para esse fim, as atribuições policiais militares que me competem.</div><div style="text-align:justify;text-indent:1.5cm">A presente investigação deve se concentrar nas informações necessárias que propiciem o reconhecimento do fato como acidente de serviço, conforme legislação pertinente.</div><div style="text-align:justify;text-indent:1.5cm">O Encarregado deverá acusar o recebimento da presente Portaria, com a respectiva data, diretamente à Autoridade Nomeante, via e-mail (da-dlp@cbm.rs.gov.br), cuja data será considerada a do início da contagem do prazo para a entrega do procedimento. Em não acusando, será considerado o primeiro dia após a expedição da presente Portaria, como início do prazo para a entrega.</div><div style="text-align:justify;text-indent:1.5cm">Fixo prazo de 30 dias para entrega da Sindicância Especial.</div><br><br><div style="text-align:center">_______________________________________________<br>MAURÍCIO DOS SANTOS DELLAMEA – Ten Cel QOEM<br>Diretor do Departamento de Logística e Patrimônio</div>`
,
  2:`<div style="text-align:center"><b>TERMO DE OITIVA DE TESTEMUNHAS</b></div><br><div style="text-align:justify;text-indent:1.5cm">Aos 19 dias, do mês de maio, do ano de 2026, compareceram na Divisão de Logística e Patrimônio do Departamento Administrativo (DLP/DA) do Corpo de Bombeiros Militar do Estado do Rio Grande do Sul (CBMRS), as testemunhas a seguir qualificadas, as quais declararam o seguinte, sobre o acidente de serviço sem morte do 2º Sgt QPBM FELIPE VARGAS OLIVEIRA, Id Func. 3694810, ocorrido no dia 16 de abril de 2026:</div><br><div style="text-align:left"><b>TESTEMUNHA Nº 1</b><br>Sd QPBM MAURÍCIO ENGEL DA PAZ<br>Possui grau de parentesco com o acidentado: (  ) sim (X) não<br>É amigo íntimo do acidentado: (  ) sim (X) não<br>Função no momento do acidente: Participante do evento.<br>Relato dos fatos pela testemunha: Lembra que estava no final da saúde física, já próximo ao período noturno, momento em que os reservas das equipes estavam em campo. Relata que visualizou o Sgt Oliveira avançar para o ataque e, ao tentar realizar um drible, referiu dor imediata, levando a mão ao joelho. Destacou que o acidente ocorreu em movimento isolado, sem contato ou disputa de bola com outro colega. Relata ainda que alguns colegas auxiliaram o sargento naquele momento, ocasião em que o militar comentou estar com a sensação de que o joelho estava "estranho" ao movimento. Após isso, observou o colega mancando e deslocando-se sozinho até a lateral do campo. No dia seguinte, conduziu o Sgt Oliveira ao Hospital da Brigada Militar para avaliação médica.<br>Assinatura da Testemunha: ____________________________<br>Assinatura do Encarregado da Sindicância: ____________________________</div><br><div style="text-align:left"><b>TESTEMUNHA Nº 2</b><br>Sd QPBM MICHEL PEREIRA ANTUNES<br>Possui grau de parentesco com o acidentado: (  ) sim (X) não<br>É amigo íntimo do acidentado: (  ) sim (X) não<br>Função no momento do acidente: Participante do evento.<br>Relato dos fatos pela testemunha: Na quinta-feira, durante a prática de futebol realizada no local previsto na Ordem de Serviço, o Sgt Oliveira, ao executar um drible com a bola, ao apoiar o pé no solo após o movimento, referiu dor imediata, vindo a cair no gramado. A testemunha relata ter visualizado o militar deixar o campo logo após o ocorrido, permanecendo fora da atividade esportiva. Informou, ainda, recordar-se de ter ouvido do Sgt Oliveira que, no dia seguinte ao fato, teria procurado atendimento médico junto ao Hospital da Brigada Militar (HBM).<br>Assinatura da Testemunha: ____________________________<br>Assinatura do Encarregado da Sindicância: ____________________________</div><br><div style="text-align:left"><b>TESTEMUNHA Nº 3</b><br>Sd QPBM EDER CASTALDI<br>Possui grau de parentesco com o acidentado: (  ) sim (X) não<br>É amigo íntimo do acidentado: (  ) sim (X) não<br>Função no momento do acidente: Participante do evento.<br>Relato dos fatos pela testemunha: Durante partida de futebol realizada com militares que atuam junto ao Comando do Corpo de Bombeiros, a testemunha visualizou o Sgt Oliveira referir dor imediatamente após realizar movimento articular ao receber a bola, vindo a cair sobre o gramado e manifestando fortes dores na região do joelho esquerdo. Relata, ainda, que observou o militar deslocar-se com dificuldade até a lateral do campo, onde permaneceu por alguns minutos após o ocorrido.<br>Assinatura da Testemunha: ____________________________<br>Assinatura do Encarregado da Sindicância: ____________________________</div>`,
  3:`<div style="text-align:center"><b>TERMO DE OITIVA DO ACIDENTADO</b></div><br><div style="text-align:justify;text-indent:1.5cm">Aos 19 dias do mês de maio do ano de 2026, compareceu junto à Divisão de Logística e Patrimônio do Departamento Administrativo (DLP/DA) do Corpo de Bombeiros Militar do Estado do Rio Grande do Sul (CBMRS) o 2º Sgt QPBM FELIPE VARGAS OLIVEIRA, Id Func. 3694810, o qual prestou declaração acerca do acidente ocorrido em 16 de abril de 2026.</div><div style="text-align:justify;text-indent:1.5cm">Relata que, durante atividade desportiva promovida pelo Departamento Administrativo do CBMRS, ao executar um movimento de drible durante partida de futebol, sentiu forte dor na região medial do joelho esquerdo. Informa que não houve contato físico com outro participante, tendo a lesão ocorrido exclusivamente durante o movimento realizado de forma isolada, ocasionando limitação imediata da mobilidade articular.</div><div style="text-align:justify;text-indent:1.5cm">Após o evento, o militar refere que não conseguiu permanecer em pé, vindo a cair sobre o gramado. Posteriormente, deslocou-se até a lateral do campo, oportunidade em que observou aumento de volume na região do joelho, associado a edema e rubor local. Relata, ainda, dificuldade para deambular, especialmente ao apoiar o pé esquerdo no solo.</div><div style="text-align:justify;text-indent:1.5cm">No mesmo dia, realizou aplicação de gelo sobre a lesão por aproximadamente 30 a 40 minutos, referindo discreto alívio da dor e redução parcial do edema.</div><div style="text-align:justify;text-indent:1.5cm">Na manhã do dia subsequente ao fato, procurou atendimento junto à emergência do Hospital da Brigada Militar, conforme boletim de atendimento nº 00844787, acostado aos autos, ocasião em que foi registrado pela médica Lavínea Stochero Balsan – CRM 55407: "mobilidade do joelho esquerdo prejudicada pela dor, edema local".</div><div style="text-align:justify;text-indent:1.5cm">Ainda no mesmo dia, submeteu-se a exame de Ressonância Magnética, cujo laudo nº 185924 evidenciou "derrame articular", além de demais alterações descritas no documento anexo ao processo.</div><div style="text-align:justify;text-indent:1.5cm">Em 19 de maio de 2026, foi instaurado o respectivo Atestado de Origem, ainda que fora do prazo ordinário, considerando a existência de documentação comprobatória de atendimento médico realizado imediatamente após o evento lesivo, permanecendo agendada a segunda fase do procedimento administrativo para a semana subsequente.</div><div style="text-align:justify;text-indent:1.5cm">O militar refere que, até a presente data, permanece com limitação funcional para movimentos de flexão do membro inferior esquerdo, especialmente ao subir escadas ou manter o joelho flexionado na posição sentada.</div><div style="text-align:justify;text-indent:1.5cm">Informa, por fim, que realizou uso de Naproxeno 500 mg, na posologia de 1 comprimido ao dia, pelo período de 05 dias, associado à aplicação local de gelo. Relata também ter realizado 04 (quatro) sessões de fisioterapia após a lesão.</div><br><br><div style="text-align:center">____________________________<br>FELIPE VARGAS OLIVEIRA – 2º Sgt QPBM<br>Acidentado<br><br><br>____________________________<br>JOSÉ LUIZ SILVA DOS SANTOS – 1º Ten QTBM<br>Sindicante</div>`,
  4:`<div style="text-align:center"><b>PARECER</b></div><br><div style="text-align:justify;text-indent:1.5cm">De tudo o que foi investigado, concluo que o acidente do 2º Sgt QPBM FELIPE VARGAS DE OLIVEIRA, Id Func. 3694810, ocorrido no dia 16 de abril de 2026, se deu nas seguintes circunstâncias:</div><br><div style="text-align:left">1. Quanto à situação:<br><br>1.1 (  ) Não há indícios de Acidente de Serviço, conforme provas contidas nas fls____;<br><br>1.2 (X) Há indícios de Acidente de Serviço, conforme provas contidas nas fls___;<br><br>2. Quanto à Legislação aplicável:<br><br>2.1 (X) Se enquadra na letra "b", do Art. 1º ou no Art 2º, do Decreto nº 32.280/86;<br><br>2.1 (  ) Não se enquadra em nenhuma das hipóteses previstas no Decreto nº 32.280/86;<br><br>3. Quanto à culpabilidade:<br><br>3.1 (  ) o acidente resulta de ___________ por parte do Policial Militar acidentado ou de subordinado seu, com sua aquiescência, conforme previsto no § 2º, do Art. 1º, do Decreto nº 32.280/86.<br><br>3.2 (X) o acidente não resulta de crime, transgressão disciplinar, imprudência ou desídia do policial-militar acidentado ou de subordinado seu, com sua aquiescência (§ 2º, Art. 1º, Decreto nº 32.280/86).</div><br><br><div style="text-align:center">Porto Alegre, RS, 29 de junho de 2026.<br><br><br>JOSÉ LUIZ SILVA DOS SANTOS – 1º Ten QTBM<br>Sindicante</div>`,
  5:`<div style="text-align:center">ESTADO DO RIO GRANDE DO SUL<br>SECRETARIA DA SEGURANÇA PÚBLICA<br>CORPO DE BOMBEIROS MILITAR<br>DEPARTAMENTO ADMINISTRATIVO<br>DIVISÃO DE LOGÍSTICA E PATRIMÔNIO</div><br><div style="text-align:right">Porto Alegre, 29 de junho de 2026.</div><br><div style="text-align:left">Ofício nº 229/DLP-DA/2026</div><br><div style="text-align:left">PROA nº: 26/1207-0002337-5</div><br><div style="text-align:left">Ao Sr. Diretor da Divisão de Logística e Patrimônio<br><br>Assunto: Restituição da Sindicância de Portaria nº 029/SA/DA/CBMRS/26</div><br><div style="text-align:justify;text-indent:1.5cm">Estando encarregado de proceder a Sindicância Especial de Portaria nº 029/SA/DA/CBMRS/26, restituo a mesma a qual possui 32 páginas.</div><br><div style="text-align:justify;text-indent:1.5cm">Respeitosamente,</div><br><br><div style="text-align:center">JOSÉ LUIZ SILVA DOS SANTOS – 1º Ten QTBM<br>Encarregado da Sindicância<br><br><br>Recebido em<br><br>____/____/______<br><br>Ass. _______________</div>`
};

// localStorage — persiste para sempre no navegador
function lsGet(k){try{return localStorage.getItem(k);}catch(e){return null;}}
function lsSet(k,v){try{localStorage.setItem(k,v);}catch(e){}}
function lsDel(k){try{localStorage.removeItem(k);}catch(e){}}

const state=new Array(TOTAL).fill(false);
let curDoc=null;

function flash(m){
  const n=document.getElementById('notify');
  n.textContent=m;n.style.display='block';
  setTimeout(()=>n.style.display='none',2800);
}

function saveState(){lsSet(LS_STATE,JSON.stringify(state));}
function saveDoc(dk,html){lsSet(LS_DOC+dk,html);}
function loadDoc(dk){return lsGet(LS_DOC+dk);}

function onInput(){
  const html=document.getElementById('doc-page').innerHTML;
  saveDoc(curDoc,html);
  document.getElementById('save-info').textContent='💾 Salvo — '+new Date().toLocaleTimeString('pt-BR');
}

function fmt(c){document.execCommand(c,false,null);document.getElementById('doc-page').focus();}

function getSelectedBlock(){
  const sel=window.getSelection();if(!sel||!sel.rangeCount)return null;
  let node=sel.getRangeAt(0).commonAncestorContainer;
  const page=document.getElementById('doc-page');
  while(node&&node!==page){
    if(node.nodeType===1&&(node.tagName==='DIV'||node.tagName==='P'))return node;
    node=node.parentNode;
  }return null;
}
function aplicarRecuo(){const b=getSelectedBlock();if(b){b.style.textIndent='1.5cm';onInput();}document.getElementById('doc-page').focus();}
function removerRecuo(){const b=getSelectedBlock();if(b){b.style.textIndent='0';onInput();}document.getElementById('doc-page').focus();}

function renderCL(){
  const cl=document.getElementById('cl');cl.innerHTML='';
  ITEMS.forEach((it,idx)=>{
    const d=document.createElement('div');
    const isActive=it.modelo&&curDoc===it.dk;
    d.className='ci'+(state[idx]?' done':'');
    const num=state[idx]?'✓':(idx+1);
    const btn=it.modelo
      ?`<button class="btn-fill${isActive?' on':''}" onclick="openDoc(${it.dk})">${isActive?'✕ Fechar':'✎ Preencher'}</button>`
      :`<button class="btn-chk" onclick="toggle(${idx})">✓</button>`;
    d.innerHTML=`<div class="ci-num">${num}</div><span class="ci-label" onclick="toggle(${idx})">${it.label}${it.modelo?'<span class="badge">modelo</span>':''}</span>${btn}`;
    cl.appendChild(d);
  });
}

function updateProg(){
  const done=state.filter(Boolean).length;
  document.getElementById('bar').style.width=(done/TOTAL*100)+'%';
  document.getElementById('counter').textContent=done+' / '+TOTAL;
}

function toggle(idx){state[idx]=!state[idx];renderCL();updateProg();saveState();}

function openDoc(dk){
  // Salva template se ainda não houver conteúdo salvo
  if(!loadDoc(dk)||loadDoc(dk)===''){
    saveDoc(dk, TPL[dk]);
  }
  // Abre editor em nova aba
  window.open('editor_documento.html?dk='+dk, '_blank');
}

function markDone(){
  if(curDoc===null)return;
  const idx=ITEMS.findIndex(i=>i.modelo&&i.dk===curDoc);
  if(idx>=0){state[idx]=true;renderCL();updateProg();saveState();flash('✓ Item marcado como concluído!');}
}

function imprimirDoc(){
  const conteudo=document.getElementById('doc-page').innerHTML;
  const janela=window.open('','_blank');
  janela.document.write(`<!DOCTYPE html><html><head><meta charset="UTF-8"><title>${DT[curDoc]}</title><style>body{font-family:'Times New Roman',Times,serif;font-size:13px;line-height:1.6;margin:2cm;color:#111}@media print{body{margin:2cm}}</style></head><body>${conteudo}</body></html>`);
  janela.document.close();
  janela.focus();
  setTimeout(()=>janela.print(),400);
}

function doReset(){
  if(!confirm('A sindicância atual será salva no histórico e uma nova será iniciada com os mesmos dados. Confirma?'))return;
  const d0=loadDoc(0),d1=loadDoc(1);
  const entry={id:Date.now(),date:new Date().toLocaleString('pt-BR'),state:[...state],docs:{0:d0,1:d1}};
  try{const r=lsGet(LS_HIST);const h=r?JSON.parse(r):[];h.unshift(entry);lsSet(LS_HIST,JSON.stringify(h));}catch(e){}
  curDoc=null;
  document.getElementById('doc-empty').style.display='flex';
  document.getElementById('doc-content').style.display='none';
  renderCL();
  flash('✓ Salvo no histórico. Tudo mantido — edite o que precisar.');
}

function openHist(){
  const r=lsGet(LS_HIST);const hist=r?JSON.parse(r):[];
  const body=document.getElementById('modal-body');
  if(!hist.length){body.innerHTML='<div class="h-empty">📭 Nenhuma sindicância no histórico ainda.</div>';}
  else{
    body.innerHTML=hist.map((e,idx)=>{
      const done=(e.state||[]).filter(Boolean).length;
      const grid=ITEMS.map((it,i)=>`<span class="hb ${e.state&&e.state[i]?'done':'pend'}">${i+1}. ${it.label.length>26?it.label.slice(0,26)+'…':it.label}</span>`).join('');
      const hd=e.docs&&(e.docs[0]||e.docs[1]);
      return`<div class="h-item"><div class="h-hdr"><div><div class="h-date">📅 ${e.date}</div><div class="h-meta">${done}/${TOTAL} concluídos${hd?' · com documentos':''}</div></div><div class="h-acts">${hd?`<button class="btn-ver" onclick="toggleVP(${idx})">👁 Ver</button>`:''}<button class="btn-reuse" onclick="reuseEntry(${idx})">↺ Reutilizar</button><button class="btn-del" onclick="delHist(${idx})">🗑 Excluir</button></div></div><div class="h-grid">${grid}</div><div class="vp" id="vp-${idx}"><div class="vtabs">${e.docs&&e.docs[0]?`<button class="vtab on" id="vt-${idx}-0" onclick="showVD(${idx},0)">Termo de Abertura</button>`:''} ${e.docs&&e.docs[1]?`<button class="vtab${e.docs&&!e.docs[0]?' on':''}" id="vt-${idx}-1" onclick="showVD(${idx},1)">Portaria</button>`:''}</div><div class="vdoc" id="vd-${idx}">${e.docs&&e.docs[0]?e.docs[0]:(e.docs&&e.docs[1]?e.docs[1]:'')}</div></div></div>`;
    }).join('');
  }
  document.getElementById('modal-bg').className='modal-bg open';
}

function toggleVP(idx){const p=document.getElementById('vp-'+idx);p.className=p.className.includes('open')?'vp':'vp open';}
function showVD(idx,dk){
  const r=lsGet(LS_HIST);const h=r?JSON.parse(r):[];const e=h[idx];if(!e)return;
  document.getElementById('vd-'+idx).innerHTML=e.docs[dk]||'';
  [0,1].forEach(d=>{const t=document.getElementById(`vt-${idx}-${d}`);if(t)t.className='vtab';});
  const t=document.getElementById(`vt-${idx}-${dk}`);if(t)t.className='vtab on';
}
function reuseEntry(idx){
  const r=lsGet(LS_HIST);const h=r?JSON.parse(r):[];const e=h[idx];if(!e)return;
  if(!confirm('Carregar dados desta sindicância como base? Confirma?'))return;
  if(e.docs&&e.docs[0])saveDoc(0,e.docs[0]);
  if(e.docs&&e.docs[1])saveDoc(1,e.docs[1]);
  if(e.state)e.state.forEach((v,i)=>{if(i<state.length)state[i]=v;});
  saveState();curDoc=null;renderCL();updateProg();
  document.getElementById('doc-empty').style.display='flex';
  document.getElementById('doc-content').style.display='none';
  closeHist();flash('✓ Dados carregados. Edite o que precisar.');
}
function delHist(idx){
  if(!confirm('Excluir esta sindicância do histórico?'))return;
  const r=lsGet(LS_HIST);const h=r?JSON.parse(r):[];
  h.splice(idx,1);lsSet(LS_HIST,JSON.stringify(h));openHist();
}
function closeHist(){document.getElementById('modal-bg').className='modal-bg';}


function saveDados(){
  const ids=['d_acidentado','d_idfunc','d_data_acid','d_data_aber','d_portaria','d_prazo','d_entrega','d_obs'];
  const obj={};ids.forEach(id=>{const el=document.getElementById(id);if(el)obj[id]=el.value;});
  lsSet('sind_dados_v3',JSON.stringify(obj));
}
function loadDados(){
  const r=lsGet('sind_dados_v3');if(!r)return;
  const obj=JSON.parse(r);
  Object.keys(obj).forEach(id=>{const el=document.getElementById(id);if(el)el.value=obj[id]||'';});
}
function toggleDados(){
  const body=document.getElementById('dados-body');
  const tog=document.getElementById('dados-toggle');
  if(body.style.display==='none'){body.style.display='block';tog.textContent='▲';}
  else{body.style.display='none';tog.textContent='▼';}
}

// INIT — carrega do localStorage
(function init(){
  const r=lsGet(LS_STATE);
  if(r){const s=JSON.parse(r);s.forEach((v,i)=>{if(i<state.length)state[i]=v;});}
  renderCL();updateProg();loadDados();
})();
</script>
</body>
</html>
