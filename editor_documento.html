<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title id="page-title">Documento — Sindicância Especial</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:Arial,sans-serif;background:#e8e8e5;min-height:100vh;display:flex;flex-direction:column}
.editor-bar{background:#1a1a2e;color:#fff;padding:10px 20px;display:flex;align-items:center;gap:10px;flex-wrap:wrap;position:sticky;top:0;z-index:100;box-shadow:0 2px 8px rgba(0,0,0,.3)}
.editor-bar-title{font-size:14px;font-weight:700;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.toolbar{display:flex;gap:3px;flex-wrap:wrap;align-items:center}
.tb{font-size:12px;background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.25);border-radius:5px;padding:4px 10px;cursor:pointer;color:#fff}
.tb:hover{background:rgba(255,255,255,.28)}
.tb.special{color:#7dd3b0;border-color:#7dd3b0;font-weight:700}
.tb.special:hover{background:rgba(125,211,176,.2)}
.tb-sep{width:1px;height:18px;background:rgba(255,255,255,.2);margin:0 3px}
.save-badge{font-size:11px;color:#7dd3b0;white-space:nowrap}
.btn-fechar{font-size:12px;background:#e74c3c;color:#fff;border:none;border-radius:6px;padding:6px 14px;cursor:pointer;font-weight:700;white-space:nowrap}
.btn-fechar:hover{background:#c0392b}
.btn-concluido{font-size:12px;background:#1D9E75;color:#fff;border:none;border-radius:6px;padding:6px 14px;cursor:pointer;font-weight:700;white-space:nowrap}
.btn-concluido:hover{background:#158a61}
.btn-imprimir{font-size:12px;background:#1a56b0;color:#fff;border:none;border-radius:6px;padding:6px 14px;cursor:pointer;font-weight:700;white-space:nowrap}
.btn-imprimir:hover{background:#143e85}
.page-wrap{flex:1;display:flex;justify-content:center;padding:32px 20px 60px;overflow-y:auto}
.doc-page{background:#fff;width:21cm;min-height:29.7cm;padding:2.5cm 3cm;font-family:'Times New Roman',Times,serif;font-size:13pt;line-height:1.6;color:#111;outline:none;box-shadow:0 2px 16px rgba(0,0,0,.15);border-radius:2px}
.doc-page:focus{box-shadow:0 2px 16px rgba(0,0,0,.2),0 0 0 2px rgba(26,86,176,.3)}
@media print{
  .editor-bar{display:none}
  body{background:#fff}
  .page-wrap{padding:0}
  .doc-page{box-shadow:none;border-radius:0;width:100%;min-height:auto;padding:2cm}
}
@media(max-width:700px){
  .doc-page{width:100%;min-height:auto;padding:1.5cm 1.2cm}
  .page-wrap{padding:16px 8px 40px}
}
</style>
</head>
<body>
<div class="editor-bar">
  <span class="editor-bar-title" id="bar-title">Documento</span>
  <div class="toolbar">
    <button class="tb" onclick="fmt('bold')" title="Negrito"><b>N</b></button>
    <button class="tb" onclick="fmt('italic')" title="Itálico"><i>I</i></button>
    <button class="tb" onclick="fmt('underline')" title="Sublinhado"><u>S</u></button>
    <div class="tb-sep"></div>
    <button class="tb" onclick="fmt('justifyLeft')" title="Esquerda">⬅</button>
    <button class="tb" onclick="fmt('justifyCenter')" title="Centralizar">≡</button>
    <button class="tb" onclick="fmt('justifyRight')" title="Direita">➡</button>
    <button class="tb" onclick="fmt('justifyFull')" title="Justificar">☰</button>
    <div class="tb-sep"></div>
    <button class="tb special" onclick="aplicarRecuo()" title="Recuo 1,5cm">¶ 1,5cm</button>
    <button class="tb special" onclick="removerRecuo()" title="Remover recuo">¶ 0</button>
  </div>
  <span class="save-badge" id="save-badge">💾 Salvo</span>
  <button class="btn-imprimir" onclick="imprimir()">🖨 Imprimir</button>
  <button class="btn-concluido" onclick="marcarConcluido()">✓ Concluído</button>
  <button class="btn-fechar" onclick="fechar()">✕ Fechar</button>
</div>
<div class="page-wrap">
  <div class="doc-page" id="doc-page" contenteditable="true" spellcheck="true"></div>
</div>
<script>
const params=new URLSearchParams(window.location.search);
const dk=parseInt(params.get('dk')||'0');
const LS_DOC='sind_doc_v3_';
const LS_STATE='sind_state_v3';
const TOTAL=18;

const DT={0:'Termo de Abertura',1:'Portaria de Sindicância Especial'};
const SP='1º Ten QTBM', SN='JOSÉ LUIZ SILVA DOS SANTOS';

const TPL={
  0:`<div style="text-align:center;line-height:1.5">ESTADO DO RIO GRANDE DO SUL<br>SECRETARIA DA SEGURANÇA PÚBLICA<br>CORPO DE BOMBEIROS MILITAR<br>DEPARTAMENTO ADMINISTRATIVO</div><br><div style="text-align:center">"URGENTE"</div><br><div style="text-align:left">SINDICÂNCIA ESPECIAL<br>ACIDENTE DE SERVIÇO SEM MORTE</div><br><br><div style="text-align:left">Sindicante: ${SP} ${SN}<br>Militar Estadual: 2º Sgt QPBM FELIPE VARGAS OLIVEIRA</div><br><br><div style="text-align:center">Termo de Abertura</div><br><div style="text-align:justify;text-indent:1.5cm">Aos dezenove dias, do mês de maio, do ano de dois mil e vinte e seis, dei início a presente Sindicância Especial, de Portaria nº 029/2026, a qual devo emitir parecer no prazo regulamentar se há ou não indício de acidente de serviço conforme legislação pertinente, referente ao fato ocorrido em 16 de abril de 2026.</div><br><div style="text-align:center">Porto Alegre, RS, 16 de junho de 2026.</div><br><br><div style="text-align:center">${SN} – ${SP}<br>Sindicante</div>`,
  1:`<div style="text-align:center;line-height:1.5">ESTADO DO RIO GRANDE DO SUL<br>SECRETARIA DA SEGURANÇA PÚBLICA<br>CORPO DE BOMBEIROS MILITAR</div><br><div style="text-align:right">Porto Alegre, RS, 13 de maio de 2026.</div><br><div style="text-align:left"><b>PORTARIA DE SINDICÂNCIA ESPECIAL<br>N.º 029/SA/DA/CBMRS/26</b></div><br><div style="text-align:left;padding-left:35%;line-height:1.6"><b>Do</b> Diretor de Logística e Patrimônio<br><b>Ao</b> ${SP} ${SN}<br><b>Assunto:</b> Instauração de Sindicância Especial<br><b>Anexo:</b> - Parte;<br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;- Atestado de Origem;<br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;- Anexo I Portaria SSP nº 095/2015;<br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;- Primeiro Atendimento.</div><br><div style="text-align:justify;text-indent:1.5cm">Tendo tomado conhecimento dos fatos constantes nos documentos que seguem em anexo, do acidente de serviço sem morte do Militar Estadual FELIPE VARGAS OLIVEIRA, Id Func 3694810, determino que seja com urgência, instaurada a Sindicância Especial, delegando-lhe para esse fim, as atribuições policiais militares que me competem.</div><div style="text-align:justify;text-indent:1.5cm">A presente investigação deve se concentrar nas informações necessárias que propiciem o reconhecimento do fato como acidente de serviço, conforme legislação pertinente.</div><div style="text-align:justify;text-indent:1.5cm">O Encarregado deverá acusar o recebimento da presente Portaria, com a respectiva data, diretamente à Autoridade Nomeante, via e-mail (da-dlp@cbm.rs.gov.br), cuja data será considerada a do início da contagem do prazo para a entrega do procedimento. Em não acusando, será considerado o primeiro dia após a expedição da presente Portaria, como início do prazo para a entrega.</div><div style="text-align:justify;text-indent:1.5cm">Fixo prazo de 30 dias para entrega da Sindicância Especial.</div><br><br><div style="text-align:center">_______________________________________________<br>MAURÍCIO DOS SANTOS DELLAMEA – Ten Cel QOEM<br>Diretor do Departamento de Logística e Patrimônio</div>`
};

document.title = DT[dk] + ' — Sindicância Especial';
document.getElementById('bar-title').textContent = DT[dk];

const page = document.getElementById('doc-page');
const saved = localStorage.getItem(LS_DOC+dk);
page.innerHTML = (saved && saved !== '') ? saved : TPL[dk];

let saveTimer;
page.addEventListener('input', ()=>{
  clearTimeout(saveTimer);
  document.getElementById('save-badge').textContent = '💾 Salvando...';
  saveTimer = setTimeout(()=>{
    localStorage.setItem(LS_DOC+dk, page.innerHTML);
    document.getElementById('save-badge').textContent = '💾 Salvo — '+new Date().toLocaleTimeString('pt-BR');
  }, 600);
});

function fmt(c){document.execCommand(c,false,null);page.focus();}

function getSelectedBlock(){
  const sel=window.getSelection();if(!sel||!sel.rangeCount)return null;
  let node=sel.getRangeAt(0).commonAncestorContainer;
  while(node&&node!==page){
    if(node.nodeType===1&&(node.tagName==='DIV'||node.tagName==='P'))return node;
    node=node.parentNode;
  }return null;
}
function aplicarRecuo(){const b=getSelectedBlock();if(b){b.style.textIndent='1.5cm';localStorage.setItem(LS_DOC+dk,page.innerHTML);}page.focus();}
function removerRecuo(){const b=getSelectedBlock();if(b){b.style.textIndent='0';localStorage.setItem(LS_DOC+dk,page.innerHTML);}page.focus();}

function marcarConcluido(){
  try{
    const idxMap={0:0,1:1};
    const idx=idxMap[dk];
    const r=localStorage.getItem(LS_STATE);
    const s=r?JSON.parse(r):new Array(TOTAL).fill(false);
    s[idx]=true;
    localStorage.setItem(LS_STATE,JSON.stringify(s));
    document.getElementById('save-badge').textContent='✓ Marcado como concluído!';
    setTimeout(()=>document.getElementById('save-badge').textContent='💾 Salvo',2000);
  }catch(e){}
}

function imprimir(){
  window.print();
}

function fechar(){
  localStorage.setItem(LS_DOC+dk, page.innerHTML);
  window.close();
}
</script>
</body>
</html>
